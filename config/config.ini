; PX4-XPlane Configuration File
; File Version: 4.0.0
; Last Updated: June 3, 2026
; Runtime source of truth for px4xplane actuator, sensor, camera, and UI
; settings. The schema JSON is editor/validator metadata only.



; General Instructions:
; - Specify the configuration name for UI display.
; - Define each aircraft type with its specific channel mappings.
; - Ensure the mappings correspond to your specific setup.
; - The 'autoPropBrakes' field specifies motor indices in X-Plane (not PX4 numbers)
;   that have an auto-prop brake system. If not specified, none have this system.
; - Motor indices can be double-checked in X-Plane Plane Maker or aircraft settings.
; - Optional cameraViews can be added per airframe:
;   Label|forward_m|right_m|up_m|pitch_offset_deg|heading_offset_deg|roll_offset_deg|zoom
;   Separate multiple camera presets with semicolons.
;   These views are read by px4xplane only. X-Plane quick-look shortcuts are
;   not required; use PX4 X-Plane > Camera Views or bind the px4xplane/camera
;   commands in X-Plane keyboard settings.
; - Optional actuatorSmoothingTimeConstantSec can be added per airframe. Use 0.0
;   for direct pass-through; small values such as 0.02-0.05 smooth low-rate HIL
;   actuator packets over the faster X-Plane frame loop. If
;   actuatorSmoothingChannels is present, smoothing applies only to those PX4
;   actuator channels.
; - Use docs/config-editor.html for schema-backed editing and validation.
; - Visit https://github.com/alireza787b/px4xplane for more information.

; Configuration Name (Displayed in UI)
; Change this name to switch between different aircraft configurations (e.g., Ehang184, Cessna172, or TB2).
; IMPORTANT: Must match the section name in this config file exactly (case-sensitive)
config_name = Alia250

; Debug Logging Configuration
; Enable verbose debug logging for diagnostics (writes to X-Plane Log.txt)
; WARNING: Enabling these will generate large amounts of log data and may affect performance
;
; BAROMETER OPTIMIZATION (October 2025):
; These debug flags are useful for validating bridge sensor timing, noise, and
; estimator behavior during controlled SITL tests.
;
; USAGE GUIDE:
; - debug_verbose_logging: General plugin status and operation logs
; - debug_log_sensor_timing: HIL_SENSOR message timing (detect gaps/delays)
; - debug_log_sensor_values: Sensor values and noise statistics (barometer validation)
; - debug_log_ekf_innovations: EKF2 innovation data (for diagnosing height estimate issues)
;
; NORMAL OPERATION: Set verbose debug flags to 'false'
; DEVELOPMENT/TUNING: Set to 'true' for sensor validation and parameter tuning
debug_verbose_logging = false
debug_log_sensor_timing = false
debug_log_sensor_values = false
debug_log_ekf_innovations = false
diagnostic_log_enabled = false
diagnostic_log_interval_s = 2.0

; Advanced Accelerometer Debug Options
; - debug_log_accel_pipeline: Log accelerometer values at each processing stage
;   Stages: S1_RAW -> S2_CAL -> S3_VIB -> S4_BIAS -> S5_FINAL
;   Use this to trace where discrepancies in the pipeline occur
; - debug_accel_bypass_calibration: Skip AccelCalibration entirely (raw X-Plane data)
;   Use this to test if calibration is causing issues
;   WARNING: Set to false for normal operation! true bypasses all calibration.
debug_log_accel_pipeline = false
debug_accel_bypass_calibration = false

; UX Configuration
; - show_connection_status_hud: Show HUD-style connection status overlay on main X-Plane screen
;   When enabled, shows connection progress, timeout warnings, and success notifications
;   This provides immediate visual feedback without requiring the data window to be open
;   Connection waits use a 60s wall-clock timeout. PX4 may need a few seconds to
;   retry TCP if it was started before the plugin began listening.
show_connection_status_hud = true

; FPS Warning Configuration
; X-Plane frame rate directly affects sensor data quality sent to PX4.
; Low FPS (below 50) can cause:
;   - Reduced sensor update rate (EKF2 expects ~200Hz, gets X-Plane FPS)
;   - Increased estimation noise and potential EKF2 warnings
;   - Less responsive flight dynamics
; - fps_warning_enabled: Show a subtle warning when FPS drops below threshold
; - fps_warning_threshold: FPS below this value triggers the warning (recommended: 50)
fps_warning_enabled = true
fps_warning_threshold = 50

; MAVLink Message Rates (Hz)
; Configure sensor and telemetry update rates sent to PX4 SITL
;
; CURRENT BEHAVIOR:
; - HIL_SENSOR rate is limited by X-Plane FPS
; - For best results, run X-Plane at 60+ FPS
; - At 60 FPS, you get ~60 Hz sensor data (works fine for most flights)
;
; PX4 SITL BEST PRACTICES (from Gazebo/jMAVSim):
; - HIL_SENSOR: 200-250 Hz target (actual rate = min(target, FPS))
; - HIL_GPS: 5-10 Hz (GPS position updates)
; - HIL_STATE_QUATERNION: 50 Hz (ground truth for comparison)
; - HIL_RC_INPUTS: 50 Hz (RC receiver data)
mavlink_sensor_rate_hz = 200
mavlink_gps_rate_hz = 20
mavlink_state_rate_hz = 10
mavlink_rc_rate_hz = 10
gps_horizontal_accuracy_m = 1.5
gps_vertical_accuracy_m = 1.0

; Accelerometer Calibration Configuration
; Fixes "High Accelerometer Bias" error in PX4 caused by X-Plane aircraft models
; reporting g_nrml != 1.0 when stationary on ground (especially VTOLs like Alia250).
;
; AUTO-CALIBRATION:
; - When enabled, the plugin measures actual gravity when stationary on startup
; - Computes offset correction to normalize to expected 9.81 m/s^2
; - Can help aircraft that report non-standard ground g-loads
;
; MANUAL OFFSETS:
; - Use only if specific aircraft consistently read incorrect gravity after calibration
; - Values in m/s^2, applied in addition to auto-calibration offset
accel_auto_calibrate = false
accel_offset_x = 0.0
accel_offset_y = 0.0
accel_offset_z = 0.0

; Ground-stationary accelerometer guard
; X-Plane can report large gear/contact g-load spikes while an aircraft is
; sitting still on the ground. When enabled, px4xplane replaces those stationary
; ground-contact spikes with attitude-consistent gravity before publishing
; HIL_SENSOR acceleration. The guard disengages once the aircraft is airborne,
; moving, or mapped motors command meaningful thrust.
ground_stationary_accel_guard_enabled = true

; Ground-stationary velocity/kinematics guard
; Uses the same stationary-on-ground detection to publish a coherent zero-motion
; sensor contract: zero GPS/HIL_STATE velocity, zero gyro rates, and latched
; GPS/HIL_STATE position/altitude. Baro pressure stays live with tiny sensor
; noise so PX4 does not mark a perfectly constant simulated pressure stream as
; stale. This is a simulator contact-model guard, not an aircraft-specific
; tuning workaround.
ground_stationary_kinematics_guard_enabled = true

