<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" role="img" aria-labelledby="title desc">
  <title id="title">PX4-XPlane logo</title>
  <desc id="desc">A minimal PX4 SITL to X-Plane bridge mark with an aircraft, runway, MAVLink nodes, and PX4-XPlane wordmark.</desc>
  <defs>
    <linearGradient id="bridge" x1="18" y1="20" x2="122" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="120" height="120" rx="22" fill="#101820"/>

  <!-- X-Plane side: runway perspective and aircraft silhouette. -->
  <path d="M38 112 66 34 94 112" fill="none" stroke="#ffffff" stroke-opacity=".22" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M66 44v58" stroke="#ffffff" stroke-opacity=".35" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 8"/>
  <path d="M39 62 94 78 74 83 68 105 58 81 39 62Z" fill="#ffffff"/>

  <!-- PX4 side: four control nodes connected through the bridge. -->
  <path d="M35 35 101 101M101 35 35 101" stroke="url(#bridge)" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="35" cy="35" r="5.5" fill="#14b8a6"/>
  <circle cx="101" cy="35" r="5.5" fill="#22c55e"/>
  <circle cx="35" cy="101" r="5.5" fill="#0ea5e9"/>
  <circle cx="101" cy="101" r="5.5" fill="#2563eb"/>
  <text x="52" y="123" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">PX4</text>

  <!-- Wordmark. -->
  <text x="154" y="66" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">PX4</text>
  <text x="226" y="66" fill="#2563eb" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">XPlane</text>
  <path d="M215 54h12" stroke="#14b8a6" stroke-width="4" stroke-linecap="round"/>
  <text x="156" y="99" fill="#506070" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1">
    MAVLINK SITL BRIDGE FOR X-PLANE
  </text>
</svg>
