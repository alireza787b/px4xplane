name: Release px4xplane

# Trigger: push a version tag (v*.*.*).
# Manual CI builds live in build.yml. Public releases are tag-only so release
# names, artifacts, and badges stay aligned.
on:
  push:
    tags:
      - 'v*.*.*'  # Matches v4.0.0, v4.0.1, v4.1.1, etc.

permissions:
  contents: write  # Required to create releases and upload assets

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_version: ${{ steps.get_version.outputs.VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Generate release notes
        id: release_notes
        run: |
          echo "# px4xplane ${{ steps.get_version.outputs.VERSION }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Downloads" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "- **Windows**: px4xplane-windows-${{ steps.get_version.outputs.VERSION }}.zip" >> RELEASE_NOTES.md
          echo "- **Linux**: px4xplane-linux-${{ steps.get_version.outputs.VERSION }}.zip" >> RELEASE_NOTES.md
          echo "- **macOS**: px4xplane-macos-${{ steps.get_version.outputs.VERSION }}.zip (Universal Binary)" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Installation" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "1. Download the appropriate ZIP file for your platform." >> RELEASE_NOTES.md
          echo "2. Extract the archive." >> RELEASE_NOTES.md
          echo "3. Copy the **px4xplane** folder into the \`Resources/plugins\` folder of your X-Plane 11 or 12 installation." >> RELEASE_NOTES.md
          echo "4. Launch X-Plane and verify the plugin loads from Plugin Admin." >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Build Information" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "- **Commit**: ${{ github.sha }}" >> RELEASE_NOTES.md
          echo "- **Built**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> RELEASE_NOTES.md
          echo "- **Platforms**: Windows (x64), Linux (x64), macOS (Universal: Intel + Apple Silicon)" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Changes" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> RELEASE_NOTES.md || echo "- Initial release" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "---" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "**Full Documentation**: https://github.com/alireza787b/px4xplane" >> RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: px4xplane ${{ steps.get_version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'alpha') || contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'rc') }}

  build-and-upload:
    name: Build ${{ matrix.platform }} for Release
    runs-on: ${{ matrix.os }}
    needs: create-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
            cmake_platform: win
            xpl_name: win.xpl

          - os: ubuntu-22.04
            platform: linux
            cmake_platform: lin
            xpl_name: lin.xpl

          - os: macos-14
            platform: macos
            cmake_platform: mac
            xpl_name: mac.xpl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev zip

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zip || true

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: |
          cd build
          if [ "${{ runner.os }}" == "Windows" ]; then
            cmake --build . --config Release
          else
            cmake --build . --config Release -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          fi
        shell: bash

      - name: Verify build output
        shell: bash
        run: |
          echo "=== Checking build output structure ==="
          ls -R build/${{ matrix.cmake_platform }}/Release/ || true
          echo ""
          echo "=== Looking for px4xplane directory ==="
          find build/${{ matrix.cmake_platform }}/Release -name "px4xplane" -type d || true

      - name: Package release
        shell: bash
        run: |
          cd build/${{ matrix.cmake_platform }}/Release

          # Verify px4xplane directory exists
          if [ ! -d "px4xplane" ]; then
            echo "ERROR: px4xplane directory not found!"
            echo "Contents of current directory:"
            ls -la
            exit 1
          fi

          # Verify plugin binary exists
          if [ ! -f "px4xplane/64/${{ matrix.xpl_name }}" ]; then
            echo "ERROR: Plugin binary not found at px4xplane/64/${{ matrix.xpl_name }}"
            echo "Contents of px4xplane/64/:"
            ls -la px4xplane/64/ || echo "Directory px4xplane/64/ does not exist"
            exit 1
          fi

          echo "✓ Plugin structure verified"
          echo "Creating ZIP archive..."

          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a -tzip ../../../px4xplane-${{ matrix.platform }}-${{ needs.create-release.outputs.release_version }}.zip px4xplane/
          else
            zip -r ../../../px4xplane-${{ matrix.platform }}-${{ needs.create-release.outputs.release_version }}.zip px4xplane/
          fi

      - name: Verify package
        shell: bash
        run: |
          if [ ! -f "px4xplane-${{ matrix.platform }}-${{ needs.create-release.outputs.release_version }}.zip" ]; then
            echo "ERROR: ZIP file not created!"
            exit 1
          fi
          ls -lh px4xplane-${{ matrix.platform }}-${{ needs.create-release.outputs.release_version }}.zip
          echo "✓ Package created successfully"

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: px4xplane-${{ matrix.platform }}-${{ needs.create-release.outputs.release_version }}.zip
          tag_name: ${{ needs.create-release.outputs.release_version }}

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [create-release, build-and-upload]
    if: always()

    steps:
      - name: Release summary
        run: |
          echo "==================================================="
          echo "  px4xplane ${{ needs.create-release.outputs.release_version }} Release"
          echo "==================================================="
          echo ""
          if [ "${{ needs.build-and-upload.result }}" == "success" ]; then
            echo "✓ All platform binaries uploaded successfully!"
            echo ""
            echo "Release available at:"
            echo "  https://github.com/${{ github.repository }}/releases/tag/${{ needs.create-release.outputs.release_version }}"
          else
            echo "✗ Some builds failed. Check logs above."
            exit 1
          fi
